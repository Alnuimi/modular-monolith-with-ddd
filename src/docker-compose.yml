services:
  auth-api:
    image: ${DOCKER_REGISTRY-}auth-api
    depends_on:
      - sqlserver
      - rabbitmq
    build:
      context: .
      dockerfile: Services/Auth/Auth.API/Dockerfile
  
  journals-api:
    image: ${DOCKER_REGISTRY-}journals-api
    depends_on:
      - journals-redisdb
      - rabbitmq
    build:
      context: .
      dockerfile: Services/Journals/Journals.API/Dockerfile

  articleHub-api:
    image: ${DOCKER_REGISTRY-}articlehub-api
    depends_on:
        - postgres
        - articlehub-hasura
        - rabbitmq
    build:
      context: .
      dockerfile: Services/ArticleHub/ArticleHub.API/Dockerfile
  
  submission-api:
    image: ${DOCKER_REGISTRY-}submission-api
    depends_on:
      - sqlserver
      - rabbitmq
      - mongo-gridfs
    build:
      context: .
      dockerfile: Services/Submissions/Submission.API/Dockerfile

  
  review-api:
    image: ${DOCKER_REGISTRY-}review-api
    depends_on:
      - sqlserver
      - rabbitmq
      - mongo-gridfs
    build:
      context: .
      dockerfile: Services/Review/Review.API/Dockerfile


  sqlserver:
    image: mcr.microsoft.com/mssql/server
    # volumes:
    #   - sqlserver_data:/var/opt/mssql

  journals-redisdb:
    image: redis/redis-stack
    # volumes:
    #   - journals_redisdb_data:/data

  postgres:
    image: postgres
    # volumes:
    #   - postgres_data:/var/lib/postgresql/data

  articlehub-hasura:
    image: hasura/graphql-engine
    depends_on:
      - postgres

  rabbitmq:
    image: "rabbitmq:management"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  
  mongo-gridfs:
    image: mongo:6.0
    volumes:
      - mongo_gridfs_data:/data/db
  

volumes:
  articlehub_data:
  rabbitmq_data:
  mongo_gridfs_data: